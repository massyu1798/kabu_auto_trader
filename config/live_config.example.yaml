# ============================================
# 本番設定（v18.0 multi-lot hold_entries + spec-aligned margin）- テンプレート
# ============================================

api:
  base_url: "ここにAPIのURLを入れる"
  password: "ここにパスワードを入れる"
  timeout_sec: 10                 # /board timeout対策（推奨10秒）

mode:
  paper_trade: false
  log_to_file: true

trade:
  initial_capital: 10000000       # 1000万（AM/PMの信用取引上限）
  max_positions: 4                # 本番リスク制約：最大同時ポジション数（2〜4銘柄）
  max_notional_per_position: 3000000  # 本番リスク制約：1ポジあたり最大建玉金額（円）
  max_total_exposure: 10000000    # 本番リスク制約：合計最大建玉金額（円）
  risk_per_trade: 0.008           # BT strategy_config.global.risk_per_trade に合わせる
  max_daily_loss: 0.03            # BT strategy_config.global.max_daily_loss に合わせる
  # 信用区分（MarginTradeType）
  # 1 = 制度信用
  # 2 = 一般信用（長期）
  # 3 = 一般信用（デイトレ） ← 推奨（手数料無料想定）
  # test_margin_order.py で事前検証してから設定してください
  margin_trade_type: 3

# 信用注文パラメータ（v18.0）
# 以下は api_client.py のデフォルト値として組み込み済みです。
# 通常は変更不要ですが、参考として記載しています。
#
# ※ DelivType は新規と返済で非対称です：
#   信用新規 (CashMargin=2): DelivType=0 (指定なし)
#   信用返済 (CashMargin=3): DelivType=2 (お預り金)
#
# margin_order:
#   exchange: 27          # 東証+（2026-02以降 Exchange=1 は新規不可、issue #1072）
#                         # ※ 新規注文の Exchange は 27 を使う
#   deliv_type_open: 0    # 受渡区分(新規): 指定なし
#   deliv_type_close: 2   # 受渡区分(返済): お預り金
#   fund_type: "11"       # 資産区分: 信用取引
#   account_type: 4       # 口座種別: 特定口座
#
# [返済注文の Exchange について]
#   返済注文の Exchange は、新規注文時の固定値(27)ではなく、
#   /positions から取得した建玉(hold_entries)の Exchange を使用します。
#   建玉の Exchange が複数混在している場合（例: 一部が 1、一部が 27）は、
#   安全のため返済を拒否します（order_manager.py で実装済み）。
#
#   Exchange 対応まとめ:
#     新規注文 → Exchange=27 固定（東証+、issue #1072 準拠）
#     返済注文 → /positions の建玉 Exchange を使用
#     建玉 Exchange 混在 → 返済拒否（要手動確認）
#
# [issue #1072 参考]
#   Exchange=1 で建てた建玉は Exchange=1 でのみ返済可。
#   Exchange=27 で建てた建玉は Exchange=27 でのみ返済可。
#   本システムは新規を Exchange=27 で統一しているため、
#   通常の返済も Exchange=27 になります。
#
# HoldID は /positions の ExecutionID を使用します（複数建玉・分割約定対応）。

# 現物（spot）注文設定
#
# [口座実測結果]
#   Exchange=27 / DelivType=2 / FundType="AA" → 成功
#   Exchange=27 / DelivType=2 / FundType="02" → エラー 100031（口座によっては不可）
#
# [設定方針]
#   FundType="AA"（信用代用有価証券）を推奨します。
#   ただし口座設定によって異なるため、必ず test_spot_minimal.py で
#   事前に正しい組み合わせを確認してから本番設定に反映してください。
#
# deliv_type: 2=預り金（デフォルト・推奨）
# fund_type:  "AA"(信用代用 ← 実測で成功) / "02"(保護預り ← 口座によっては不可)
spot:
  deliv_type: 2
  fund_type: "AA"              # 口座実測: "AA" 成功 / "02" → 100031 エラー
                               # 変更前に test_spot_minimal.py で必ず事前確認すること

# screener設定
# enabled=true の場合、起動時に screen_stocks() を実行しBTと同じ銘柄を自動選定
# enabled=false の場合、下記 watchlist を使用
screener:
  enabled: true

# スクリーナ無効時 or フォールバック用の手動watchlist
watchlist:
  - "9984"  # ソフトバンクG
  - "8035"  # 東京エレク
  - "6857"  # アドバンテスト
  - "6098"  # リクルート
  - "6762"  # TDK
  - "6981"  # 村田製作
  - "7203"  # トヨタ
  - "6758"  # ソニー
  - "6501"  # 日立
  - "8306"  # 三菱UFJ
  - "6902"  # デンソー

interval:
  price_check_sec: 30
  signal_check_sec: 300

# ── オーバーナイトギャップ (ONG) 設定 ───────────────────────────────────
# エントリー: 14:50-15:00 引け前成行買い（MarginTradeType=2: 一般信用長期）
# エグジット: 翌営業日 9:00-9:05 寄り付き成行売り
ong:
  enabled: true
  max_positions: 2              # ONG最大同時保有銘柄数（AM/PMとは独立）
  margin_trade_type: 2          # 一般信用（長期）※デイトレ(=3)では持ち越し不可
  # エントリー条件・サイジングは config/overnight_config.yaml で設定

# ── シンプル順張り (SM) 設定 ──────────────────────────────────────────
# シグナル: 11:25 前場騰落率評価
# エントリー: 11:30 成行
# エグジット: 12:30 後場寄り成行
sm:
  enabled: true
  max_positions_per_side: 2     # 片側最大2銘柄（ロング2+ショート2=最大4）
  # 詳細条件・サイジングは config/simple_momentum_config.yaml で設定
