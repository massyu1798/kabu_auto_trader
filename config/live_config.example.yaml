# ============================================
# 本番設定（v13.1 BT-aligned）- テンプレート
# ============================================

api:
  base_url: "ここにAPIのURLを入れる"
  password: "ここにパスワードを入れる"
  timeout_sec: 10                 # /board timeout対策（推奨10秒）

mode:
  paper_trade: false
  log_to_file: true

trade:
  initial_capital: 7000000        # 700万（BT strategy_config.yaml に合わせる）
  max_positions: 5                # BT strategy_config.global.max_positions に合わせる
  risk_per_trade: 0.008           # BT strategy_config.global.risk_per_trade に合わせる
  max_daily_loss: 0.03            # BT strategy_config.global.max_daily_loss に合わせる
  margin_type: "day_trade"

# v13.1: screener設定
# enabled=true の場合、起動時に screen_stocks() を実行しBTと同じ銘柄を自動選定
# enabled=false の場合、下記 watchlist を使用
screener:
  enabled: true

# スクリーナ無効時 or フォールバック用の手動watchlist
watchlist:
  - "9984"  # ソフトバンクG
  - "8035"  # 東京エレク
  - "6857"  # アドバンテスト
  - "6098"  # リクルート
  - "6762"  # TDK
  - "6981"  # 村田製作
  - "7203"  # トヨタ
  - "6758"  # ソニー
  - "6501"  # 日立
  - "8306"  # 三菱UFJ

interval:
  price_check_sec: 30
  signal_check_sec: 300
