# ============================================
# オーバーナイト・ギャップ (ONG) 設定 v1.0
# 資金配分: 300万円（午前・午後の資産と並行利用）
# ============================================

global:
  initial_capital: 5000000      # 500万円
  max_risk_per_trade: 100000    # 1トレード最大損失額 (円)
  slippage_rate: 0.0001
  commission_rate: 0.0

ong:
  # ── エントリー条件 ──────────────────────────
  ibs_threshold: 0.2            # IBS < 0.2 (安値圏引け)
  rsi2_threshold: 10.0          # RSI(2) < 10 (極端な売られ過ぎ)
  decline_threshold: -1.5       # 当日下落率 <= -1.5%
  night_tailwind_threshold: 0.3 # 夜間追い風 >= +0.3% (1321.T翌日始値で近似)
  skip_friday: true             # 金曜エントリー禁止（週末リスク回避）

  # ── ポジションサイジング (ATRベース) ────────
  atr_period: 14
  atr_risk_multiplier: 2.0      # size = max_risk_per_trade / (ATR × 2.0)

  # ── エグジット ───────────────────────────────
  stop_loss_pct: -1.0           # ギャップダウン時損切りキャップ (%)

