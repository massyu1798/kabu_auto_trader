# ============================================
# Strategy Config v14: Multi-Strategy (Leverage 3x)
# 保証金300万 × レバレッジ3倍 = 建玉上限 1000万円
# ============================================

global:
  initial_capital: 10000000          # 1000万円（信用建玉上限）
  margin_capital: 3333333            # 保証金（実質資金）
  leverage: 3.0                      # レバレッジ倍率
  max_positions: 8
  combined_max_positions: 3
  risk_per_trade: 0.01               # 建玉ベースの1% = 10万円
  max_daily_loss: 0.03               # 日次最大損失3.0% = 30万円（レバ3倍で2.5%は厳しすぎる）
  commission_rate: 0.0               # デイトレ信用手数料無料想定
  slippage_rate: 0.001
  max_holding_days: 0                # デイトレ（当日決済）

screening:
  enabled: true
  min_volume: 300000                 # 流動性要件を引き上げ
  min_price: 500
  max_price: 50000                   # 上限緩和
  min_atr_pct: 0.8                   # ボラティリティ要件引き上げ
  max_stocks: 60

daily_bias:
  ema_short: 5
  ema_long: 25

strategies:
  # === 戦略① ミーンリバージョン（主力: weight最大） ===
  mean_reversion:
    enabled: true
    weight: 2.5                      # 主力戦略のため高ウェイト（VWAP乖離+RSI+BBの逆張り）
    params:
      rsi_period: 14
      rsi_oversold: 30               # RSI < 30 で買いシグナル（機会増加）
      rsi_overbought: 70             # RSI > 70 で売りシグナル（機会増加）
      bb_period: 20
      bb_std: 2.0                    # 2.0σ乖離でシグナル（ダマシを削減）
      vwap_deviation_threshold: 1.2  # VWAP乖離 1.2σ（閾値を緩和してシグナル増加）
      use_vwap: true                 # VWAP乖離フィルター有効化
      volume_confirm_ratio: 1.3      # 出来高確認の閾値を下げる

  # === 戦略② ブレイクアウト・モメンタム ===
  breakout:
    enabled: true
    weight: 1.5                      # 順張り補完
    params:
      channel_period: 15             # 短期のブレイクアウト捕捉
      orb_minutes: 20                # 寄付20分でORBレンジ確定（早期ブレイクアウト検出）
      use_orb: true                  # Opening Range Breakout 有効化
      macd_confirm: true             # MACD確認フィルター

  # === トレンドフォロー（フィルター役） ===
  trend_follow:
    enabled: true
    weight: 0.8                      # フィルター役のため低め
    params:
      ema_short: 3                   # より短期のクロスを検出
      ema_long: 15                   # 同上
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      sell_enabled: true             # デッドクロスでSELLシグナルも

  # === 出来高プロファイル（補助フィルター） ===
  volume_profile:
    enabled: true
    weight: 0.5                      # 補助のため低め
    params:
      vwap_period: 20
      volume_surge_ratio: 1.5

ensemble:
  buy_threshold: 1.2                 # エントリー条件を少し緩和
  sell_threshold: -1.2               # 空売りも同基準

exit:
  atr_period: 14
  stop_loss_atr_multiplier: 2.0      # SL: ATR × 2.0（損切り貧乏を防止）
  take_profit_rr_ratio: 2.0          # TP: RR比 1:2（TPが遠すぎて利確できない問題を解決）
  trailing_stop: true
  trailing_atr_multiplier: 1.5       # TSをタイトにして利益を逃さない

cooldown:
  enabled: true
  bars_after_loss: 6                 # 30分クールダウン（5分足×6本）
  bars_after_win: 2

trend_filter:
  enabled: true
  ema_period: 60

# === レジーム判定（新規追加） ===
regime:
  nikkei_vi_normal: 20               # 通常モード閾値
  nikkei_vi_caution: 30              # 警戒モード閾値
  caution_size_ratio: 0.5            # 警戒時ポジション縮小率
  defense_size_ratio: 0.25           # 防御時ポジション縮小率

live_risk_caps:
  max_notional_per_position: 1500000 # 1ポジション最大150万円
  max_total_exposure: 10000000       # 総エクスポージャー1000万円
  safety_margin_ratio: 0.95
