# ============================================
# 戦略パラメータ（v12.4: モーニング・モメンタム復元版）
# ============================================

global:
  initial_capital: 3000000
  max_positions: 5
  risk_per_trade: 0.008
  max_daily_loss: 0.03
  commission_rate: 0.0
  slippage_rate: 0.001
  max_holding_days: 0

screening:
  enabled: true
  min_volume: 200000
  min_price: 500                # 低位株を排除
  max_price: 40000
  min_atr_pct: 0.7
  max_stocks: 60                # 60銘柄

daily_bias:
  ema_short: 5
  ema_long: 25

strategies:
  trend_follow:
    enabled: true
    weight: 1.5                 # 順張りを最重視
    params:
      ema_short: 5
      ema_long: 20
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9

  mean_reversion:
    enabled: true
    weight: 0.4                 # 逆張りはさらに慎重に
    params:
      rsi_period: 14
      rsi_oversold: 20
      rsi_overbought: 80
      bb_period: 20
      bb_std: 2.5

  breakout:
    enabled: true
    weight: 1.2
    params:
      channel_period: 20

  volume_profile:
    enabled: true
    weight: 1.0
    params:
      vwap_period: 20
      volume_surge_ratio: 1.5

ensemble:
  buy_threshold: 1.2
  sell_threshold: -99.0           # -2.5 → -99.0 に復元（ショート無効化）

exit:
  atr_period: 14
  stop_loss_atr_multiplier: 1.5   # 2.5 → 1.5 に復元（タイト損切り）
  take_profit_rr_ratio: 3.0       # 2.5 → 3.0 に復元（利益を伸ばす）
  trailing_stop: true
  trailing_atr_multiplier: 2.0

cooldown:
  enabled: true
  bars_after_loss: 15             # 12 → 15 に復元
  bars_after_win: 5               # 3 → 5 に復元

trend_filter:
  enabled: true
  ema_period: 60
