# ============================================
# Strategy Config v17: MR集中 + BO一時停止 (Leverage 3x)
# 保証金約333万 × レバレッジ3倍 = 建玉上限 1000万円
# MR 80%(800万) / BO 0%(停止) / ONG 20%(200万)
# ============================================

global:
  initial_capital: 10000000          # 1000万円（信用建玉上限）
  margin_capital: 3333333            # 保証金（実質資金）
  leverage: 3.0                      # レバレッジ倍率
  max_positions: 5                   # 8→5: 同時保有上限を厳格化
  combined_max_positions: 3
  risk_per_trade: 0.01               # 建玉ベースの1% = 10万円
  max_daily_loss: 0.025              # 3.0%→2.5%: 日次最大損失 = 25万円
  weekly_max_loss: 0.05              # 週間最大損失5.0% → 超過で週末まで停止
  monthly_max_loss: 0.10             # 月間最大損失10% → 超過で月末まで停止
  commission_rate: 0.0               # デイトレ信用手数料無料想定
  slippage_rate: 0.001
  max_holding_days: 0                # デイトレ（当日決済）

# === 戦略別資金配分 ===
capital_allocation:
  mean_reversion: 0.80               # v17: 0.50→0.80 MR集中（BO停止分を振替）
  breakout: 0.00                     # v17: 0.30→0.00 BO停止
  overnight_gap: 0.20                # 維持

screening:
  enabled: true
  min_volume: 300000                 # 流動性要件を引き上げ
  min_price: 500
  max_price: 50000                   # 上限緩和
  min_atr_pct: 0.8                   # ボラティリティ要件引き上げ
  max_stocks: 60

daily_bias:
  ema_short: 5
  ema_long: 25

strategies:
  # === 戦略① ミーンリバージョン（主力: weight最大） ===
  mean_reversion:
    enabled: true
    weight: 3.5                      # v17: 2.5→3.5 MR集中戦略
    params:
      rsi_period: 14
      rsi_oversold: 25               # 30→25: 厳格化でダマシ削減
      rsi_overbought: 75             # 70→75: 厳格化でダマシ削減
      bb_period: 20
      bb_std: 2.0                    # 2.0σ乖離でシグナル
      vwap_deviation_threshold: 1.5  # 1.2→1.5: 厳格化でシグナル精度向上
      use_vwap: true                 # VWAP乖離フィルター有効化
      volume_confirm_ratio: 1.5      # 1.3→1.5: 出来高確認を厳格化
    exit:                            # MR戦略固有エグジット
      take_profit_pct: 0.008         # 0.005→0.008: +0.8%利確（損切り幅とのバランス改善）
      stop_loss_pct: 0.005           # 0.003→0.005: -0.5%損切り（ノイズ耐性向上）
      vwap_reversion: true           # VWAP回帰（乖離率0付近）で利確
      vwap_reversion_threshold: 0.5  # v17: 0.3→0.5 VWAP回帰利確の発動率UP
      time_cutoff: "14:30"           # 14:30時間切り

  # === 戦略② ブレイクアウト・モメンタム ===
  breakout:
    enabled: false                   # v17: PF 0.41の損失源を一時停止
    weight: 1.5                      # v17停止中（再有効化時の参照値）
    params:
      channel_period: 15             # 短期のブレイクアウト捕捉
      orb_minutes: 30                # 20→30: 寄付30分でORBレンジ確定（仕様通り）
      use_orb: true                  # Opening Range Breakout 有効化
      macd_confirm: true             # MACD確認フィルター
    exit:                            # BO戦略固有エグジット
      partial_targets: [0.01, 0.02, 0.03]  # 分割決済: 1/3ずつ +1%, +2%, +3%
      stop_loss_pct: 0.005           # 0.007→0.005: -0.5%損切り（1回の損失を縮小）
      orb_reentry_stop: true         # ORBレンジ内に戻った場合の損切り
      time_cutoff: "14:00"           # 14:00エントリー停止

  # === トレンドフォロー（フィルター役） ===
  trend_follow:
    enabled: true
    weight: 0.8                      # フィルター役のため低め
    params:
      ema_short: 3                   # より短期のクロスを検出
      ema_long: 15                   # 同上
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      sell_enabled: false            # true→false: デッドクロスSELLシグナルを停止（SHORT勝率25%のため）

  # === 出来高プロファイル（補助フィルター） ===
  volume_profile:
    enabled: true
    weight: 0.5                      # 補助のため低め
    params:
      vwap_period: 20
      volume_surge_ratio: 1.5

  # === 戦略③ オーバーナイト・ギャップ（日足独立ループで処理） ===
  overnight_gap:
    enabled: false                   # アンサンブルには含めない（main_backtest.pyで独立ループ）
    weight: 1.0
    params:
      ibs_oversold: 0.2              # IBS < 0.2 で売られすぎ判定
      rsi2_oversold: 10              # RSI(2) < 10 で超売られすぎ
      min_daily_drop_pct: -1.5       # 当日下落率 -1.5%以上が必要
      signal_score_threshold: 1.1    # 0.8→1.1: 3条件AND必須に近づける（低品質シグナル抑制）

ensemble:
  buy_threshold: 2.5                 # v17: 2.0→2.5 エントリー条件厳格化
  sell_threshold: -2.5               # v17: -2.0→-2.5

exit:
  atr_period: 14
  stop_loss_atr_multiplier: 2.0      # SL: ATR × 2.0（損切り貧乏を防止）
  take_profit_rr_ratio: 2.0          # TP: RR比 1:2（TPが遠すぎて利確できない問題を解決）
  trailing_stop: true
  trailing_atr_multiplier: 1.5       # TSをタイトにして利益を逃さない

cooldown:
  enabled: true
  bars_after_loss: 12                # v17: 6→12 連敗抑制（1時間クールダウン）
  bars_after_win: 2

trend_filter:
  enabled: true
  ema_period: 60

# === レジーム判定（新規追加） ===
regime:
  nikkei_vi_normal: 20               # 通常モード閾値
  nikkei_vi_caution: 30              # 警戒モード閾値
  caution_size_ratio: 0.5            # 警戒時ポジション縮小率
  defense_size_ratio: 0.25           # 防御時ポジション縮小率

live_risk_caps:
  max_notional_per_position: 1500000 # 1ポジション最大150万円
  max_total_exposure: 10000000       # 総エクスポージャー1000万円
  safety_margin_ratio: 0.95
