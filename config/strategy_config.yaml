# ============================================
# Strategy Config v14: Multi-Strategy (Leverage 3x)
# 保証金300万 × レバレッジ3倍 = 建玉上限 1000万円
# ============================================

global:
  initial_capital: 10000000          # 1000万円（信用建玉上限）
  margin_capital: 3333333            # 保証金（実質資金）
  leverage: 3.0                      # レバレッジ倍率
  max_positions: 5
  combined_max_positions: 3
  risk_per_trade: 0.01               # 建玉ベースの1% = 10万円
  max_daily_loss: 0.025              # 日次最大損失2.5% = 25万円
  commission_rate: 0.0               # デイトレ信用手数料無料想定
  slippage_rate: 0.001
  max_holding_days: 0                # デイトレ（当日決済）

screening:
  enabled: true
  min_volume: 300000                 # 流動性要件を引き上げ
  min_price: 500
  max_price: 50000                   # 上限緩和
  min_atr_pct: 0.8                   # ボラティリティ要件引き上げ
  max_stocks: 60

daily_bias:
  ema_short: 5
  ema_long: 25

strategies:
  # === 戦略① ミーンリバージョン（主力: weight最大） ===
  mean_reversion:
    enabled: true
    weight: 2.0                      # 主力戦略のため高ウェイト
    params:
      rsi_period: 14
      rsi_oversold: 25               # RSI < 25 で買いシグナル
      rsi_overbought: 75             # RSI > 75 で売りシグナル
      bb_period: 20
      bb_std: 1.5                    # 1.5σ乖離でシグナル
      vwap_deviation_threshold: 1.5  # VWAP乖離 1.5σ
      use_vwap: true                 # VWAP乖離フィルター有効化
      volume_confirm_ratio: 1.5      # 出来高確認（セリクラ検知）

  # === 戦略② ブレイクアウト・モメンタム ===
  breakout:
    enabled: true
    weight: 1.5                      # 順張り補完
    params:
      channel_period: 20
      orb_minutes: 30                # 寄付き30分レンジ
      use_orb: true                  # Opening Range Breakout 有効化
      macd_confirm: true             # MACD確認フィルター

  # === トレンドフォロー（フィルター役） ===
  trend_follow:
    enabled: true
    weight: 1.0
    params:
      ema_short: 5
      ema_long: 20
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      sell_enabled: true             # デッドクロスでSELLシグナルも

  # === 出来高プロファイル（補助フィルター） ===
  volume_profile:
    enabled: true
    weight: 0.8
    params:
      vwap_period: 20
      volume_surge_ratio: 1.5

ensemble:
  buy_threshold: 1.5                 # 厳選エントリー
  sell_threshold: -1.5               # 空売りも同基準

exit:
  atr_period: 14
  stop_loss_atr_multiplier: 1.5      # SL: ATR × 1.5
  take_profit_rr_ratio: 3.0          # TP: RR比 1:3
  trailing_stop: true
  trailing_atr_multiplier: 2.0

cooldown:
  enabled: true
  bars_after_loss: 12
  bars_after_win: 3

trend_filter:
  enabled: true
  ema_period: 60

# === レジーム判定（新規追加） ===
regime:
  nikkei_vi_normal: 20               # 通常モード閾値
  nikkei_vi_caution: 30              # 警戒モード閾値
  caution_size_ratio: 0.5            # 警戒時ポジション縮小率
  defense_size_ratio: 0.25           # 防御時ポジション縮小率

live_risk_caps:
  max_notional_per_position: 1500000 # 1ポジション最大150万円
  max_total_exposure: 10000000       # 総エクスポージャー1000万円
  safety_margin_ratio: 0.95
