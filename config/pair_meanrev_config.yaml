global:
  initial_capital: 5000000
  max_positions_per_side: 3        # 2→3に拡大
  risk_per_position: 0.20          # 25%→20%に分散
  commission_rate: 0.0             # デイトレ信用手数料無料
  slippage_rate: 0.001             # スリッページ0.1%

timing:
  signal_eval_time: 1125           # シグナル評価時刻
  entry_time: 1130                 # エントリー時刻（前場引け）
  exit_mode: "immediate"           # "immediate"=後場寄り / "delayed"=12:35決済
  exit_time_immediate: 1230        # 後場寄り
  exit_time_delayed: 1235          # 遅延決済
  force_close_time: 1235           # タイムストップ

scoring:
  weights:
    daily_return: 0.30
    relative_return: 0.25
    late_morning_momentum: 0.20
    vwap_deviation: 0.15
    volume_ratio: 0.10
  min_abs_score_threshold: 0.3     # 順張りでエントリー機会を増やすため低め設定（逆張り時0.5から引き下げ）

entry_thresholds:
  long_daily_return_min: 0.01      # 前日比+1.0%以上（上昇モメンタム追随）
  long_relative_return_min: 0.007  # TOPIX比+0.7%以上
  long_late_momentum_min: 0.003    # 後半+0.3%以上
  short_daily_return_max: -0.01    # 前日比-1.0%以下（下落継続売り）
  short_relative_return_max: -0.007 # TOPIX比-0.7%以下
  short_late_momentum_max: -0.003  # 後半-0.3%以下
  min_volume_ratio: 0.5            # 出来高が20日平均の0.5倍以上

filters:
  min_morning_turnover: 3000000000 # 前場売買代金30億円（20億→30億に引き上げ）
  max_daily_return_pct: 5.0        # 騰落率±5%超除外
  max_late_momentum_pct: 3.0       # 後半モメンタム±3%超除外
  max_volume_ratio: 5.0            # 出来高倍率5倍以上除外（材料株の可能性高い）
  max_topix_move_pct: 2.0          # TOPIX前場±2%超で見送り
  max_topix_late_move_pct: 0.5     # TOPIX終盤(11:00-11:25)急変フィルタ
  max_same_sector_per_side: 1      # 同一セクター片側最大1

exit:
  stop_loss_pct: 0.008             # ストップロス0.8%
  take_profit_pct: 0.006           # 利確0.6%（順張りは利が伸びやすいため拡大）
  force_close_time: 1235           # 強制決済

risk:
  max_daily_loss: 0.02             # 1.5%→2.0%に緩和
