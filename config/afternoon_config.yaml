# ============================================
# 午後リバーサル戦略パラメータ v1.1
# ============================================

global:
  initial_capital: 3000000
  max_positions: 3
  risk_per_trade: 0.006
  max_daily_loss: 0.02
  commission_rate: 0.0
  slippage_rate: 0.001

screening:
  enabled: true
  min_volume: 200000
  min_price: 500
  max_price: 40000
  min_atr_pct: 0.7
  max_stocks: 60

afternoon_reversal:
  # エントリー時間帯
  entry_start: 1230
  entry_end: 1400

  # 午前変動率フィルター
  min_morning_move_pct: 1.0       # �� 1.5 → 1.0（対象銘柄を増やす）

  # RSI設定
  rsi_period: 14
  rsi_oversold: 30                # ★ 25 → 30（エントリー機会増）
  rsi_overbought: 70              # ★ 75 → 70（エントリー機会増）

  # ボリンジャーバンド設定
  bb_period: 20
  bb_std: 1.8                     # ★ 2.0 → 1.8（条件緩和）

  # 出来高フィルター
  volume_surge_ratio: 1.3

exit:
  atr_period: 14
  stop_loss_atr_multiplier: 1.5
  take_profit_atr_multiplier: 2.0
  trailing_stop: true
  trailing_atr_multiplier: 2.0    # ★ 1.5 → 2.0（TSを緩めてVWAP到達を待つ）
  force_close_time: 1450

cooldown:
  enabled: true
  bars_after_loss: 6
  bars_after_win: 2
