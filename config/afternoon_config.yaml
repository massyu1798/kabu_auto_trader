# ============================================
# 午後リバーサル戦略パラメータ v14
# 保証金300万 × レバレッジ3倍 = 建玉上限 1000万円
# ============================================

global:
  initial_capital: 10000000
  margin_capital: 3333333
  leverage: 3.0
  max_positions: 3
  risk_per_trade: 0.008
  max_daily_loss: 0.02
  commission_rate: 0.0
  slippage_rate: 0.001

screening:
  enabled: true
  min_volume: 300000
  min_price: 500
  max_price: 50000
  min_atr_pct: 0.8
  max_stocks: 60

afternoon_reversal:
  entry_start: 1230
  entry_end: 1400
  min_morning_move_pct: 1.5
  rsi_period: 14
  rsi_oversold: 25
  rsi_overbought: 75
  bb_period: 20
  bb_std: 2.0
  volume_surge_ratio: 1.3

exit:
  atr_period: 14
  stop_loss_atr_multiplier: 1.2
  take_profit_atr_multiplier: 1.5
  trailing_stop: true
  trailing_atr_multiplier: 1.5
  force_close_time: 1450

cooldown:
  enabled: true
  bars_after_loss: 6
  bars_after_win: 2

live_risk_caps:
  max_notional_per_position: 1500000
  max_total_exposure: 10000000
  safety_margin_ratio: 0.95
