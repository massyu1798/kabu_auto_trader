# ============================================
# 午後リバーサル戦���パラメータ
# ============================================

global:
  initial_capital: 3000000
  max_positions: 3                # 午前と合わせて最大5を想定（午前5 + 午後3���
  risk_per_trade: 0.006           # 午前より控えめ（逆張りリスク考慮）
  max_daily_loss: 0.02            # 午後単体での最大損失
  commission_rate: 0.0
  slippage_rate: 0.001

screening:
  enabled: true
  min_volume: 200000
  min_price: 500
  max_price: 40000
  min_atr_pct: 0.7
  max_stocks: 60

afternoon_reversal:
  # エントリー時間��
  entry_start: 1230               # 12:30 から
  entry_end: 1400                 # 14:00 まで

  # 午前変動率フィルター
  min_morning_move_pct: 1.5       # 寄りから1.5%以上動いた銘柄のみ対象

  # RSI設���
  rsi_period: 14
  rsi_oversold: 25                # 午前の20より緩め（午後は動きが小さい）
  rsi_overbought: 75

  # ボリンジャーバンド設定
  bb_period: 20
  bb_std: 2.0

  # 出来高フィルター
  volume_surge_ratio: 1.3         # 平均の1.3倍以上

exit:
  atr_period: 14
  stop_loss_atr_multiplier: 1.5   # タイトめ（逆張りなので早め損切り）
  take_profit_atr_multiplier: 2.0 # VWAP回帰が主目標
  trailing_stop: true
  trailing_atr_multiplier: 1.5    # タイトめ
  force_close_time: 1450          # 14:50に強制決済

cooldown:
  enabled: true
  bars_after_loss: 6              # 午後は時間が短いので短め
  bars_after_win: 2
