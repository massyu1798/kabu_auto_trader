# ============================================
# 本番設定（v12ベース）
# ============================================

api:
  password: "179825519"
  base_url: "http://localhost:18080/kabusapi"
  timeout: 5

mode:
  paper_trade: false              # ← true → false に変更（実際に発注される）
  log_to_file: true

trade:
  initial_capital: 3000000  # ←ここを 3000000 に修正
  max_positions: 4                # 同時保有は4銘柄（バックテストに合わせる）
  risk_per_trade: 0.007           # 1回のリスク
  max_daily_loss: 0.04
  margin_type: "day_trade"

# 監視銘柄（バックテストで選定された上位銘柄をここに入れるか、固定する）
watchlist:
  - "9984" # ソフトバンクG
  - "8035" # 東京エレク
  - "6857" # アドバンテスト
  - "6098" # リクルート
  - "6762" # TDK
  - "6981" # 村田製作
  - "7203" # トヨタ
  - "6758" # ソニー
  - "6501" # 日立
  - "8306" # 三菱UFJ

interval:
  price_check_sec: 30         # ← 10 → 30秒に変更
  signal_check_sec: 300